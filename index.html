<head>

<title>Easyways · Pendientes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0f14;--surface:#151820;--border:#252a3a;--text:#e8eaf0;--muted:#5a6080;--accent:#4f9cf9;--green:#3ecf8e;--yellow:#f5c542;--red:#f56565;--purple:#a78bfa;--orange:#fb923c;--pink:#f472b6;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Syne',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
  .header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .logo{font-family:var(--display);font-size:18px;font-weight:800;}.logo span{color:var(--accent);}
  .logo sub{font-size:12px;color:var(--muted);font-weight:400;font-family:var(--mono);margin-left:6px;}
  .sync{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .stats-bar{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
  .stat{flex:1;min-width:70px;background:var(--surface);padding:10px 14px;text-align:center;border-right:1px solid var(--border);}
  .stat:last-child{border-right:none;}
  .stat strong{display:block;font-family:var(--display);font-size:20px;font-weight:800;line-height:1.1;}
  .stat span{font-family:var(--mono);font-size:10px;color:var(--muted);}
  .stat.s-urg strong{color:var(--red);}.stat.s-pend strong{color:var(--yellow);}.stat.s-done strong{color:var(--green);}.stat.s-tot strong{color:var(--accent);}
  .progress{height:3px;background:var(--border);}.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .6s;}
  .main{padding:16px 22px;}
  .filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:11.5px;cursor:pointer;color:var(--muted);font-family:var(--mono);transition:all .15s;user-select:none;}
  .chip:hover{color:var(--text);border-color:#444;}
  .chip.on.all{background:var(--accent);border-color:var(--accent);color:#fff;}
  .chip.on.imp{background:rgba(79,156,249,.18);border-color:var(--accent);color:var(--accent);}
  .chip.on.adm{background:rgba(167,139,250,.18);border-color:var(--purple);color:var(--purple);}
  .chip.on.log{background:rgba(251,146,60,.18);border-color:var(--orange);color:var(--orange);}
  .chip.on.sac{background:rgba(244,114,182,.18);border-color:var(--pink);color:var(--pink);}
  .chip.on.ico{background:rgba(62,207,142,.18);border-color:var(--green);color:var(--green);}
  .chip.on.ops{background:rgba(245,197,66,.18);border-color:var(--yellow);color:var(--yellow);}
  .chip.on.done{background:rgba(62,207,142,.1);border-color:var(--green);color:var(--green);}
  .group{margin-bottom:22px;}
  .group-title{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-family:var(--display);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;}
  .gdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .gcount{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;}
  .card{background:var(--surface);border:1px solid var(--border);border-left:3px solid transparent;border-radius:8px;padding:11px 14px;margin-bottom:7px;display:flex;gap:11px;align-items:flex-start;transition:border-color .15s,opacity .2s;}
  .card:hover{border-color:#2e3450;}.card.urg{border-left-color:var(--red);}.card.pen{border-left-color:var(--yellow);}.card.res{opacity:.35;border-left-color:var(--green)!important;}
  .chk{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .chk:hover{border-color:var(--green);}.chk.on{background:var(--green);border-color:var(--green);}.chk.on::after{content:'✓';color:#0d0f14;font-size:10px;font-weight:900;}
  .cbody{flex:1;min-width:0;}.ctitle{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:3px;}.card.res .ctitle{text-decoration:line-through;color:var(--muted);}
  .cmeta{font-family:var(--mono);font-size:10.5px;color:var(--muted);line-height:1.55;}
  .tags{margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;}
  .tag{font-family:var(--mono);font-size:9.5px;padding:2px 7px;border-radius:4px;font-weight:500;}
  .tag.urg{background:rgba(245,101,101,.12);color:var(--red);}.tag.pen{background:rgba(245,197,66,.12);color:var(--yellow);}
  .empty{text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:12px;}
</style>
</head>

ority":"urg","old":false},{"id":"t_19ea794f1a9ec1e3","title":"Envio premio concurso","detail":"De: Jenyfer  Olivera | Hola\r Este sería el código:\r \r EWMKTGD13200\r \r Estará disponible en la plataform","group":"Logística","priority":"pen","old":false},{"id":"t_19e8a50ce6480cfe","title":"Cotización Viña Concha y Toro","detail":"De: Jenyfer  Olivera | Hola @Agustina Páez<mailto:apaez@easyways-la.com>\r \r Este sería el código de seg","group":"Logística","priority":"pen","old":false},{"id":"t_19ea78bc932b88a0","title":"Regalo Cliente-  Viña Concha y Toro","detail":"De: Jenyfer  Olivera | Hola  @Yubitza Tapia<mailto:ytapia@easyways-la.com>\r \r Hice 1 despacho que me so","group":"Importaciones","priority":"pen","old":false},{"id":"t_19ea7665326b6de2","title":"Ventas Cancelada de Mercado Libre 08.06.20265","detail":"De: Yubitza Tapia | Hola María.\r \r Listo, NC emitida\r \r 5489\r \r \r Cordialmente,\r \r [cid:58eabf1e-b9c","group":"Servicio al Cliente","priority":"pen","old":false},{"id":"t_19ea759a69eeda0b","title":"Solicitud Provisión de Fondos EasyWays Ref.: CL01526 Despacho: 120171","detail":"De: Monserrat Rojas | Buenas tardes Cristobal,\r \r Favor autorizar transferencia subida a Easyways, cor","group":"Logística","priority":"pen","old":false},{"id":"t_19e856e4c2add707","title":"SOLICITOP FACTURA DE WATTS S.A.","detail":"De: Yubitza Tapia | Hola Hungría.\r \r Adjunto documento solicitado.\r \r \r Cordialmente,\r \r [cid:dc3271","group":"Administración","priority":"pen","old":false},{"id":"t_19e8f076d4d0fa9d","title":"SPM128 AND SPM128JS NEW ORDER SUNWAY","detail":"De: \"María Teresa Infante\" | Dear Emma,\r \r We will make a change for only 240 SPM128J\r \r \r Can you send me th","group":"Importaciones","priority":"pen","old":false},{"id":"t_19e87c5c20569e5f","title":"回复: 回复: BOOKING EWMP01 // PI NO: GN2603036","detail":"De: \"cherry@szgainer.cn\" | Dear Maria,\r \r Can you pls help to update if shipping docs aporoved by your cust","group":"Importaciones","priority":"pen","old":false},{"id":"t_19ea567542c16944","title":"Cierre de SD3562939 - Problema Internet","detail":"De: claroempresas@clarovtr.cl | <table border=\"0\" style=\"max-height: 300px;\r             overflow-y: auto; width","group":"Operaciones","priority":"pen","old":false},{"id":"t_19ea041228c53885","title":"Resolución de SD3562939","detail":"De: claroempresas@clarovtr.cl | Estimado Sr. /Sra. MATIAS ECHENIQUE\r \r \t\t\tLe informamos que su solicitud SD35629","group":"Operaciones","priority":"pen","old":false},{"id":"t_19e73fc64ff7476f","title":"Contact Grill New Order SW182E","detail":"De: \"María Teresa Infante\" | Thanks hailey!\r \r Look all OK\r \r Logo size:  5cmm X 0,58 cm\r \r Like This!\r \r [ci","group":"Operaciones","priority":"pen","old":false},{"id":"t_19e99a8cda943de3","title":"DESPACHO APROBADO EASY WAYS 120171","detail":"De: Jimena Lopez | Estimados:\r \r Adjunto DIN 120171 aprobada, para su pago.\r SAN ANTONIO - MSC ABUJ","group":"Importaciones","priority":"pen","old":false},{"id":"t_19e9998d501d6ee5","title":"solicitud provision de Fondos para su Ref.: CL01526 Despacho: 120171","detail":"De: \"AG. DE AD. PAMELA ORTEGA MINO Y CIA. LTDA\" | Sirvase encontrar Solicitud de Provision de Fondos\r  para el Despacho 120171 seg","group":"Logística","priority":"pen","old":false},{"id":"t_19e997c79a937946","title":"COTIZACION EASYWAYS BOOKING MB REF PI N° CTKE4026032701 / P26268","detail":"De: Renzo Polo | Hola Mari,\r Buenos días,\r Favor considera nuestra mejor tarifa e información sob","group":"Importaciones","priority":"urg","old":false},{"id":"t_19e9978ddd2f5924","title":"Solicitud de pedido","detail":"De: \"Sughey  Hernández de Easyways\" | Estimada junto con saludar dejo pedido para ser gestionado según disponibilidad ","group":"Servicio al Cliente","priority":"pen","old":false},{"id":"t_19e9976174f9d4d8","title":"Booking Milano Coffee EWMDC01- CHILE  P.I NO: PIS20260306","detail":"De: \"María Carlina Ramos\" | Dear Canny,\r \r We can ship this load ( P.I NO: PIS20260306) together with other ","group":"Importaciones","priority":"pen","old":false}];
const KEY='ew_auto';
let saved={};try{saved=JSON.parse(localStorage.getItem(KEY)||'{}');}catch{}
let items=RAW.map(r=>({...r,done:r.done||(saved[r.id]===true)}));
function persist(){const s={};items.forEach(i=>{if(i.done)s[i.id]=true;});localStorage.setItem(KEY,JSON.stringify(s));}
let af='all';
function setF(f,el){af=f;document.querySelectorAll('.chip').forEach(c=>{const cl=c.dataset.f==='all'?'all':GCLASS[c.dataset.f]||'done';c.className='chip '+cl;});el.classList.add('on');render();}
function toggle(id){const it=items.find(i=>i.id===id);if(it){it.done=!it.done;persist();render();}}
function stats(){const tot=items.length,done=items.filter(i=>i.done).length,urg=items.filter(i=>i.priority==='urg'&&!i.done).length;document.getElementById('sTot').textContent=tot;document.getElementById('sUrg').textContent=urg;document.getElementById('sPend').textContent=items.filter(i=>i.priority!=='urg'&&!i.done).length;document.getElementById('sDone').textContent=done;document.getElementById('pFill').style.width=tot?Math.round(done/tot*100)+'%':'0%';}
function card(it){const pc=it.priority==='urg'?'urg':'pen',pl=it.priority==='urg'?'🔴 Urgente':'🟡 Pendiente';return '<div class="card '+pc+' '+(it.done?'res':'')+'"><div class="chk '+(it.done?'on':'')+'" onclick="toggle(''+it.id+'')"></div><div class="cbody"><div class="ctitle">'+it.title+'</div><div class="cmeta">'+it.detail+'</div><div class="tags"><span class="tag '+pc+'">'+pl+'</span></div></div></div>';}
function render(){stats();const board=document.getElementById('board');let html='';if(af==='done'){const l=items.filter(i=>i.done);html=l.length?l.map(card).join(''):'<div class="empty">Sin resueltos aún</div>';}else if(af==='all'){GROUPS.forEach(g=>{const l=items.filter(i=>i.group===g&&!i.done);if(!l.length)return;html+='<div class="group"><div class="group-title"><div class="gdot" style="background:'+GCOL[g]+'"></div>'+g+'<span class="gcount">'+l.length+' pendiente'+(l.length!==1?'s':'')+'</span></div>'+l.map(card).join('')+'</div>';});const done=items.filter(i=>i.done);if(done.length)html+='<div class="group"><div class="group-title"><div class="gdot" style="background:#3ecf8e"></div>Resueltos<span class="gcount">'+done.length+'</span></div>'+done.map(card).join('')+'</div>';if(!html)html='<div class="empty">Sin correos relevantes en los últimos 3 días</div>';}else{const l=items.filter(i=>i.group===af&&!i.done);html=l.length?'<div class="group">'+l.map(card).join('')+'</div>':'<div class="empty">Sin pendientes en esta área ✓</div>';}board.innerHTML=html;}
render();
</script>
